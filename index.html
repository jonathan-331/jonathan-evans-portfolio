const { useState, useEffect, useRef } = React;

const C = {
  ink:         'rgb(26,27,31)',
  green:       'rgb(55,126,34)',
  greenMuted:  'rgb(118,153,116)',
  greenLight:  'rgb(212,219,214)',

  warmWhite:   'rgb(247,249,246)',
  white:       '#fff',
  gray:        'rgb(158,158,158)',

/* ── FADE IN ── */
function useFadeIn(delay = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
      { threshold: 0.08 }
    );
    const t = setTimeout(() => obs.observe(el), delay);
    return () => { clearTimeout(t); obs.disconnect(); };
  }, [delay]);
  return ref;
}

/* ── NAV LINK — Poppins Medium 12px green; active = muted green + dot ── */
function NavLink({ label, active, onClick, href }) {
  const [hov, setHov] = useState(false);
  return (
    <a
      href={href || '#'}
      target={href && href.startsWith('http') ? '_blank' : undefined}
      rel={href && href.startsWith('http') ? 'noopener noreferrer' : undefined}
      onClick={e => { if (!href || href === '#') { e.preventDefault(); onClick && onClick(); } }}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        fontFamily: "'Poppins', sans-serif",
        fontWeight: 500,
        fontSize: 12,
        lineHeight: 1,
        color: active ? C.greenMuted : C.green,
        textDecoration: (!active && hov) ? 'underline' : 'none',
        cursor: 'pointer',
        letterSpacing: '0.01em',
        display: 'flex',
        alignItems: 'center',
        gap: 5,
      }}>
      {active && <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.greenMuted, flexShrink: 0, display: 'inline-block' }} />}
      {label}
    </a>
  );
}

/* ── HEADER ── */
function Header({ screen, onNav }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 8);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

    { label: 'Resume',   dest: 'resume' },

    { label: 'Contact',  href: 'mailto:jonathan@jonathan-evans.com', dest: null },
  ];

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200,
      height: 64, background: C.white,
      boxShadow: scrolled ? '0px 4px 4px 0px rgba(0,0,0,0.25)' : '0px 1px 0px 0px rgba(0,0,0,0.06)',

            label={item.label.toUpperCase()}
            active={screen === item.dest}
            href={item.href}
            onClick={item.dest ? () => onNav(item.dest) : undefined}
          />
        ))}
      </nav>
    </header>
  );
}

    category: 'Design Strategy',
    cardImg: 'assets/cards/power-plants.png',
    tags: ['Design Strategy', 'Journey Maps', 'Workshops'],
    desc: 'Spearheaded the UX strategy for complex power plant operations, transforming critical outage management processes into streamlined, efficient workflows.',
    sections: [
      {
        id: 'overview', label: 'Overview', layout: 'full',
        content: `This engagement focused on understanding and improving the workflow of power plant operations teams responsible for managing planned and unplanned outages. Power plant outage management is a high-stakes, time-sensitive process involving dozens of stakeholders, complex regulatory requirements, and significant financial implications.\n\nI led design strategy work to identify opportunities for improving how operations teams plan, coordinate, and execute outage management activities — with the goal of reducing downtime, improving safety, and enhancing team coordination.`,
      },
      {
        id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `Power plant operations teams were managing critical outage workflows using outdated tools — a combination of spreadsheets, email chains, and disparate legacy systems. This fragmented approach led to communication breakdowns, missed maintenance windows, and costly unplanned downtime.\n\nThe core challenge was understanding how to bring modern design thinking to a highly regulated, safety-critical environment while respecting the expertise and established practices of experienced operations professionals.`,
      },
      {
        id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Led design strategy and research planning.\n\nContextual inquiry with plant operations teams.\n\nWorkflow mapping and process documentation.\n\nOpportunity identification and design brief development.\n\nStakeholder workshop facilitation.`,
      },
      {
        id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Accessing a highly secure, regulated environment for research.\n\nBuilding trust with expert practitioners skeptical of outside consultants.\n\nBalancing safety requirements with workflow efficiency improvements.\n\nReconciling diverse stakeholder needs across operations, maintenance, and management.`,
      },
      {
        id: 'living', label: 'Living in the System', layout: 'full',
        content: `To truly understand the complexity of power plant operations, I embedded with plant teams during both normal operations and a scheduled outage event. This immersive contextual inquiry approach allowed me to observe the actual workflows, communication patterns, and decision-making processes that documentary research alone would have missed.\n\nKey observations included the critical role of informal communication networks, the cognitive load placed on shift supervisors during outage coordination, and the significant gap between documented procedures and actual operational practice.`,
        image: { caption: 'Contextual inquiry — embedded observation during plant outage event', src: 'assets/projects/power-plants/journey-map.png', bg: '#f0f2f5' },
      },
      {
        id: 'workshops', label: 'Design Workshops', layout: 'full',
        content: `Following the contextual research phase, I facilitated a series of co-design workshops with cross-functional plant teams including operations, maintenance, engineering, and management. These workshops used structured ideation exercises to generate and prioritize design opportunities.\n\nParticipants mapped their current workflows, identified pain points, and collaboratively sketched concepts for improved tools and processes. The workshop outputs directly informed the design strategy recommendations delivered to the client.`,
        image: { caption: 'Co-design workshop — cross-functional outage workflow mapping', src: 'assets/projects/power-plants/concept-cards.png', bg: '#eef0f5' },
      },
      {
        id: 'userflows', label: 'User Types', layout: 'full',
        content: `The research identified five distinct user types within the power plant operations ecosystem, each with unique roles, responsibilities, and information needs during outage events: the Shift Supervisor, the Maintenance Coordinator, the Engineering Lead, the Regulatory Compliance Officer, and the Plant Manager.\n\nUnderstanding the relationships and information flows between these user types was essential to designing solutions that supported the entire outage management ecosystem rather than optimizing for individual roles in isolation.`,
      },
      {
        id: 'prototype', label: 'Concept Prototyping', layout: 'full',
        content: `Based on the research findings and workshop outputs, I developed low-fidelity concept prototypes for a unified outage management interface. These prototypes focused on improving real-time visibility into outage status, streamlining cross-team communication, and reducing the cognitive burden on shift supervisors.\n\nConcept testing with operations teams validated the core design direction and surfaced specific requirements that shaped the detailed design recommendations delivered to the client.`,
        image: { caption: 'Outage management concept — unified operations dashboard', src: 'assets/projects/power-plants/wireframe.png', bg: '#f0f3f5' },
      },
      {
        id: 'outcomes', label: 'Outcomes', layout: 'full',
        content: `Comprehensive workflow documentation across all outage management phases.\n\nFive detailed user personas representing key operational roles.\n\nIdentified 23 high-priority design opportunities across the outage management workflow.\n\nDesign strategy brief adopted as the foundation for a technology platform procurement process.\n\nCo-design workshops built organizational alignment around user-centered design principles.`,
      },
    ],
  },
  {
    id: 'moen',
    title: 'Moen',
    subtitle: '',
    category: 'Research & Design',
    cardImg: 'assets/cards/moen.png',
    tags: ['UX Research', 'Workflows', 'Voice UI'],
    desc: 'Architected the interaction models for Moen\'s next-generation voice-controlled product, delivering an award-winning product named one of Better Homes & Gardens\' Top 30 Most Innovative Products.',
    sections: [
      {
        id: 'overview', label: 'Overview', layout: 'full',
        content: `Moen, a leader in kitchen and bath products, was expanding into the smart home space with a voice-controlled shower system. I led the UX research and design for the voice user interface (VUI) of the Moen Smart Shower — a connected shower system controllable via Alexa voice commands.\n\nThis project required developing deep expertise in voice interaction design, understanding the unique context of bathroom use, and designing for a fundamentally different input modality than traditional touch interfaces.`,
      },
      {
        id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `Voice control in the bathroom presents unique design challenges. Users interact with the system while simultaneously performing other tasks — their hands may be wet, they may be reaching for towels, or they may be getting children ready for the day. Traditional app-based control was seen as cumbersome in this context.\n\nThe core design challenge was creating a voice experience that felt natural, reliable, and delightful — one that enhanced the shower experience rather than adding complexity to it.`,
      },
      {
        id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Led VUI research and design strategy.\n\nUser journey mapping.\n\nVoice interaction design and dialog flows.\n\nContextual user research in home environments.\n\nUsability testing of voice interaction prototypes.\n\nCollaboration with Alexa team at Amazon.`,
      },
      {
        id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Designing for audio-only feedback in a noisy, wet environment.\n\nBalancing discoverability with simplicity of voice commands.\n\nAddressing privacy concerns around always-on microphones in bathrooms.\n\nDesigning error recovery flows for misrecognized voice commands.\n\nCoordinating across Moen hardware, software, and Amazon Alexa teams.`,
      },
      {
        id: 'voicestudio', label: 'Voice Studio', layout: 'full',
        content: `To develop an authentic understanding of voice interaction in the shower context, I established a "Voice Studio" research environment that simulated bathroom conditions — including ambient noise levels, steam, and the physical constraints of shower use.\n\nThis controlled environment allowed us to test voice command clarity, response timing, and error recovery in conditions that approximated real-world use without the logistical challenges of in-home testing. Key findings shaped the fundamental design principles for the Moen voice experience.`,
        image: { caption: 'Voice Studio setup — simulating bathroom acoustic environment for VUI testing', src: 'assets/projects/moen/lab-setup.png', bg: '#eef2f5' },
      },
      {
        id: 'documenting', label: 'Documenting Interfaces', layout: 'full',
        content: `I developed a comprehensive documentation framework for the voice interface design, including conversation flow diagrams, sample dialog scripts, and error handling decision trees. This documentation served as both a design artifact and a development specification.\n\nThe documentation system established patterns for command recognition, confirmation responses, error messaging, and contextual help — creating a coherent voice experience across all supported use cases.`,
        image: { caption: 'VUI documentation — conversation flows and dialog design specifications', src: 'assets/projects/moen/utterances.png', bg: '#f0f4f8' },
      },
      {
        id: 'listen', label: 'Listen and Innovate', layout: 'full',
        content: `User research revealed that voice interaction with smart home devices was still an emerging behavior for most consumers. Many users had Alexa devices but used them primarily for music and timers — the concept of controlling physical appliances was novel and sometimes intimidating.\n\nThis insight led to a design strategy focused on progressive disclosure — introducing voice control through simple, high-value commands that built user confidence, before revealing more advanced capabilities.`,
      },
      {
        id: 'contextual', label: 'Contextual Information', layout: 'full',
        content: `In-home contextual research with families using the Moen Smart Shower system in their actual bathrooms provided invaluable insights into real-world usage patterns. Observations revealed unexpected use cases — children using voice commands independently, users creating custom presets for family members — as well as friction points not captured in lab testing.\n\nThis contextual data led to several significant design refinements, particularly around family member personalization and the design of the "shower is ready" notification experience.`,
        image: { caption: 'Contextual research — in-home observation of Smart Shower usage patterns', src: 'assets/projects/moen/interactions.png', bg: '#f2f5f8' },
      },
      {
        id: 'prototyping', label: 'Prototyping', layout: 'full',
        content: `I designed and tested multiple VUI prototypes using Wizard of Oz methodology — where a researcher manually triggered audio responses in real-time to simulate the voice system's behavior. This approach allowed rapid iteration on dialog flows and response timing without full system implementation.\n\nPrototype testing revealed critical insights about user expectations for response latency, confirmation verbosity, and error recovery — all of which were incorporated into the final Alexa skill design.`,
        image: { caption: 'Wizard of Oz VUI prototype testing — iterating on dialog flows', src: 'assets/projects/moen/high-level-flows.png', bg: '#f0f3f8' },
      },
      {
        id: 'architecture', label: 'About the Architecture', layout: 'full',
        content: `The technical architecture of the Moen Smart Shower voice interface required careful coordination across three systems: the Moen Smart Shower hardware, the Amazon Alexa platform, and the Moen cloud backend. I worked closely with engineers from all three teams to ensure that the designed user experience was technically achievable within the constraints of each system.\n\nKey architectural decisions around command processing latency, offline fallback behavior, and multi-user profile management were directly influenced by user research findings about expectations and usage patterns.`,
        image: { caption: 'System architecture diagram — Moen Smart Shower voice integration', src: 'assets/projects/moen/final-interaction-flows.png', bg: '#eef0f5' },
      },
      {
        id: 'outcomes', label: 'Outcomes', layout: 'full',
        content: `Moen Smart Shower VUI named one of Better Homes & Gardens' Top 30 Most Innovative Products.\n\nSuccessfully launched Alexa skill with voice control across full shower functionality.\n\nDeveloped comprehensive VUI design system and documentation framework.\n\nEstablished user research protocols for voice interface design adopted by Blink UX.\n\nDelivered in-home contextual research findings that shaped product roadmap for next generation.`,
      },
    ],
  },
  { id: 'gaming', title: 'Gaming', subtitle: '', category: 'Research', cardImg: 'assets/cards/gaming.png', tags: ['UX Research', 'Design Strategy', 'Personas'], desc: 'Led specialized UX research initiative in the card gaming sector, decoding player emotion and initial engagement dynamics to optimize the gameplay experience.',
    sections: [
      { id: 'overview', label: 'Overview', layout: 'full',
        content: `As part of a study into how people learn and engage with card games, I led user research designed to understand the emotional and cognitive dimensions of game learning. Using a combination of observational methods, facial expression capture, and structured interviews, I investigated how players experience frustration, engagement, and delight as they progress through learning a new game.\n\nThe research surfaced actionable insights about how game designers and UX practitioners can better support first-time players, reducing friction and increasing the likelihood of continued engagement.` },
      { id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `Understanding player emotion during game learning is notoriously difficult. Self-report methods are unreliable — players often underreport frustration or struggle to articulate what they're feeling in the moment. Traditional usability testing approaches didn't capture the affective dimensions that are central to gaming experiences.\n\nThe research challenge was to develop a methodology that could capture authentic emotional responses in real time without disrupting the natural play experience.` },
      { id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Facilitation.\n\nUser research and design.\n\nLive information filtering.\n\nExperiments.\n\nInforming personas and other related research.` },
      { id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Specific challenges related to emotional measurement.\n\nValidity in non-lab emotion capture.\n\nCreating controlled conditions without artificial environments.\n\nLinking emotional data to specific game moments.` },
      { id: 'launching', label: 'Launching Into Study', layout: 'full',
        content: `The research study was structured in three phases: pre-play orientation, observed play sessions, and post-play debrief interviews. Participants were recruited with no prior knowledge of the specific card game being studied, ensuring authentic first-time learning experiences.\n\nA key methodological innovation was the use of simultaneous facial expression capture alongside think-aloud protocols — allowing us to correlate self-reported experience with objectively measured affective signals at specific moments in the game learning arc.\n\nThe study tracked: engagement levels across learning stages, frustration triggers and recovery patterns, moments of delight and discovery, and the role of social facilitation in game learning.`,
        image: { caption: 'Human and camera capturing smile — emotion detection during card game play', src: 'assets/projects/gaming/camera-setup.png', bg: '#f5f2e8' } },
      { id: 'categorizing', label: 'Categorizing Emotional Responses', layout: 'full',
        content: `Emotional responses were categorized using a validated affective framework adapted for gaming contexts. Facial expressions were mapped to five primary emotional states — Engaged, Frustrated, Confused, Amused, and Neutral — with inter-rater reliability established across two independent coders.\n\nCross-referencing emotional state data with game event logs revealed clear patterns: confusion peaks clustered around specific rule-learning moments, while amusement spikes correlated with unexpected game outcomes. These patterns provided actionable guidance for game designers seeking to calibrate difficulty curves and tutorial design.`,
        image: { caption: 'Emotion categorization — smile-o-meter mapping across five affective states', src: 'assets/projects/gaming/smile-o-meter.png', bg: '#f8f5e8' } },
      { id: 'results', label: 'Results', layout: 'full',
        content: `The study findings revealed several significant patterns in how novice players experience card game learning:\n\nEngagement levels were highest in the first five minutes and after first successful round completion, with a notable dip during rule explanation phases.\n\nFrustration events were most frequent when players encountered rule exceptions, but recovery was rapid when facilitated by other players rather than written instructions.\n\nAmused emotional states were strongly correlated with unexpected victories and creative plays, suggesting that designing for "delightful surprises" is a key lever for engagement.\n\nThe findings informed specific design recommendations for game tutorial systems, rule presentation, and the facilitation of social learning dynamics in competitive card game contexts.`,
        image: { caption: 'Results — emotional response frequency across game learning stages', src: 'assets/projects/gaming/enjoyment-levels.png', bg: '#f0f5f0' } },
      { id: 'outcomes', label: 'Outcomes', layout: 'full',
        content: `Developed validated methodology for real-time emotion capture in gaming research.\n\nIdentified key emotional inflection points in the card game learning arc.\n\nDelivered design recommendations adopted into game tutorial redesign.` },
    ],
  },
  { id: 'bloodbanks', title: 'Blood Banks', subtitle: '', category: 'Research & Design', cardImg: 'assets/cards/blood-banks.png', tags: ['UX Research', 'UX Design', 'Healthcare'], desc: 'Directed end-to-end research and design initiative to optimize blood bank operations, transforming high-friction journey into streamlined, efficient workflow.',
    sections: [
      { id: 'overview', label: 'Overview', layout: 'full',
        content: `Blood banking is a critical but often overlooked aspect of the healthcare system. I led research and design work focused on improving the operations of blood bank staff and the experience of blood donors throughout the donation process.\n\nThis project combined contextual inquiry with blood bank staff, observational research in donation centers, and participatory design sessions to identify opportunities for improving both the operational efficiency of blood bank workflows and the quality of the donor experience.` },
      { id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `Blood banks face dual challenges: operational complexity on the staff side and a donor experience that is often clinical and uninviting. Donor retention is a persistent challenge — many first-time donors do not return for subsequent donations, representing a significant gap in blood supply sustainability.\n\nOn the operational side, staff relied on legacy software systems that created data silos, manual reconciliation tasks, and communication gaps between collection, processing, and distribution teams.` },
      { id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Stakeholder interviews and contextual research.\n\nWorkflow documentation and mapping.\n\nDonor journey mapping.\n\nUX design and prototyping.\n\nUsability testing sessions.` },
      { id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Access to a regulated healthcare environment.\n\nPrivacy and compliance requirements.\n\nBalancing operational efficiency with donor experience.\ \ Diverse staff roles with conflicting workflow needs.` },
      { id: 'concept', label: 'Connect', layout: 'full',
        content: `Early research revealed that the biggest operational pain point was the disconnect between the donor-facing and staff-facing systems. Donors had no visibility into wait times, appointment status, or their donation history, while staff had to manually cross-reference multiple systems to manage donor flow.\n\nThe design concept centered on a unified platform connecting donor self-service touchpoints with staff operational dashboards — creating a shared data layer that would reduce manual reconciliation and give donors meaningful real-time information about their donation journey.`,
        image: { caption: 'Connected system concept — donor and staff-facing interface integration', src: 'assets/projects/blood-banks/high-level-flow.png', bg: '#f0f5f8' } },
      { id: 'refined', label: 'A Refined Vision', layout: 'full',
        content: `Following initial concept testing, I refined the design vision through iterative workshops with blood bank staff and donor focus groups. The refined concept introduced a progressive disclosure model — presenting donors with a simple, reassuring interface while giving staff a richer operational view of the same underlying data.\n\nKey design innovations included a visual donor queue system for staff, a donor-facing appointment and history portal, and an inspection checklist interface that reduced manual documentation burden for collection staff.`,
        image: { caption: 'Refined donor flow — from appointment booking through post-donation follow-up', src: 'assets/projects/blood-banks/concept.png', bg: '#f5f0f0' } },
      { id: 'madeeasier', label: 'Made Easier', layout: 'full',
        content: `The "Made Easier" phase focused on simplifying the highest-friction moments in both the donor and staff workflows. For donors, this meant redesigning the pre-donation health screening questionnaire as a guided, conversational interface rather than a clinical form.\n\nFor staff, the key improvement was an inspection and release interface that consolidated the multi-step product inspection process into a single streamlined view — reducing the time from collection to product release by an estimated 23%.`,
        image: { caption: 'Donor screening app with integrated inspection interface', src: 'assets/projects/blood-banks/mobile.png', bg: '#f8f0f0', maxWidth: '65%' } },
      { id: 'earlyproto', label: 'Early Prototyping', layout: 'full',
        content: `Early prototypes of the staff-facing operations dashboard were developed and tested in a simulated blood bank environment with working staff. These sessions revealed critical requirements around data density preferences, alert prioritization, and the importance of at-a-glance status visibility for high-volume collection shifts.\n\nThe dark-mode dashboard design that emerged from these sessions prioritized ambient information display and minimized the cognitive load of switching between operational views during busy collection periods.`,
        image: { caption: 'Staff operations dashboard — dark mode prototype for high-volume collection shifts', src: 'assets/projects/blood-banks/desktop.png', bg: '#2a3040' } },
      { id: 'outcomes', label: 'Outcomes', layout: 'full',
        content: `Developed unified donor and staff platform concept with validated interaction model.\n\nDonor journey map adopted as foundation for center redesign planning.\n\nEstimated 23% reduction in product release processing time from inspection interface redesign.\n\nDonor satisfaction prototype testing showed significant improvement in perceived wait time and communication clarity.` },
    ],
  },
  { id: 'brainscience', title: 'Brain Science', subtitle: '', category: 'Research & Strategy', cardImg: 'assets/cards/brain-science.png', tags: ['UX Research', 'UX Design', 'Prototypes'], desc: 'Architected advanced digital tools for the brain science domain, optimizing complex, data-heavy research workflows to streamline scientific discovery.',
    sections: [
      { id: 'overview', label: 'Overview', layout: 'full',
        content: `This project involved research and design work in support of neuroscience research workflows. I collaborated with researchers and clinicians to understand how complex brain science data is collected, analyzed, and communicated — and to identify opportunities for improving the tools and interfaces that support this work.\n\nThe project spanned multiple research phases including contextual inquiry with neuroscientists, co-design workshops, and prototype development for a brain science data visualization and research coordination platform.` },
      { id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `Neuroscience researchers work with extraordinarily complex, multi-modal datasets — combining imaging data, behavioral measurements, genetic information, and clinical observations. The tools available to manage and analyze this data were fragmented, technically demanding, and poorly suited to collaborative research workflows.\n\nThe core challenge was designing interfaces that could make complex brain science data more accessible to researchers with varying levels of technical expertise, while preserving the depth and precision required by domain experts.` },
      { id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `UX research and strategy.\n\nContextual inquiry with research teams.\n\nWorkflow mapping and gap analysis.\n\nDesign and prototyping.` },
      { id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Highly specialized domain knowledge required.\n\nDiverse user base with varying technical needs.\n\nComplex information architecture.\n\nResearcher time constraints limiting availability for research.` },
      { id: 'anatomy', label: 'Brain Anatomy', layout: 'full',
        content: `To design effectively for neuroscience researchers, I developed a foundational understanding of brain anatomy and the key concepts that shape how researchers think about and navigate brain data. This domain immersion involved literature review, expert interviews, and participation in research team meetings.\n\nThis knowledge base was essential for designing navigation systems and data organization schemas that aligned with researchers' mental models — rather than imposing a generic information architecture on a highly specialized domain.`,
        image: { caption: 'Brain anatomy reference framework — mapping research domains to visualization needs', src: 'assets/projects/brain-science/card-sort.png', bg: '#e8edf5' } },
      { id: 'understanding', label: 'Understanding the Brain', layout: 'full',
        content: `I developed a comprehensive workflow map of the neuroscience research process — from experimental design and data collection through analysis, interpretation, and publication. This map revealed critical coordination points where researchers needed better tools for sharing data, tracking experimental status, and communicating findings across distributed teams.\n\nKey insights included the significant time researchers spent on data format conversion and the lack of standardized protocols for sharing intermediate analysis results — both representing high-value design opportunities.`,
        image: { caption: 'Research workflow map — neuroscience data collection through publication pipeline', src: 'assets/projects/brain-science/journey-map.png', bg: '#eef2f8' } },
      { id: 'bringing', label: 'Bringing It Together', layout: 'full',
        content: `The design synthesis phase brought together findings from contextual research, workflow mapping, and expert interviews into a unified set of design principles and opportunity areas. I developed a research platform concept that addressed the three highest-priority needs identified: unified data access, collaborative annotation, and streamlined publication workflows.\n\nPrototypes were developed at varying fidelity levels for each opportunity area and tested with researcher participants to validate design direction before committing to detailed specifications.`,
        image: { caption: 'Prototype wireframes — unified research platform concept', src: 'assets/projects/brain-science/wireframe-prototype.png', bg: '#f0f4f8' } },
      { id: 'sensemaking', label: 'Sense Making', layout: 'full',
        content: `A key design challenge was supporting the sense-making process — helping researchers identify patterns and generate hypotheses from large, multi-dimensional datasets. I explored several design approaches for data visualization and interactive exploration, testing each with researcher participants to understand which visual representations best supported pattern recognition and hypothesis generation.\n\nThe winning approach combined a high-level overview visualization with progressive detail drill-down, allowing researchers to move fluidly between population-level patterns and individual specimen data.`,
        image: { caption: 'Sense-making interface — layered visualization from population to individual level', src: 'assets/projects/brain-science/final-design.png', bg: '#f0f3f8' } },
      { id: 'fieldstudy', label: 'Field Study', layout: 'full',
        content: `A field study phase embedded me within a neuroscience research lab for an extended observation period. This immersive approach revealed workflow nuances that could not have been captured through interviews alone — including informal knowledge-sharing practices, the role of physical artifacts in the research process, and the significant cognitive overhead of managing data across multiple disconnected systems.\n\nField study observations directly informed several key design decisions in the final platform prototype, particularly around notification design and the integration of informal communication channels into the research coordination workflow.`,
        image: { caption: 'Field study — embedded observation in active neuroscience research lab', src: 'assets/projects/brain-science/story-approach.png', bg: '#f5f0f5' } },
      { id: 'outcomes', label: 'Outcomes', layout: 'full',
        content: `Comprehensive neuroscience research workflow documentation.\n\nThree validated design concepts for research coordination platform.\n\nData visualization framework adopted for prototype development.\n\nResearch platform concept presented to funding stakeholders.\n\nField study findings published as internal design guidelines for scientific UX work.` },
    ],
  },
  { id: 'realestate', title: 'Real Estate', subtitle: '', category: 'Research, Design & Strategy', cardImg: 'assets/cards/real-estate.png', tags: ['UX Research', 'UX Strategy', 'Design'], desc: 'Drove the product evolution of a comprehensive real estate property platform, transforming fragmented user journeys into a focused experience.',
    sections: [
      { id: 'overview', label: 'Overview', layout: 'full',
        content: `I led research, design, and strategy for a real estate property platform aimed at improving how buyers, sellers, and agents navigate the complex process of residential real estate transactions. The project involved extensive user research with all three stakeholder groups, synthesis of findings into actionable design strategy, and development of a platform concept validated through iterative prototype testing.\n\nThe real estate market is characterized by high emotional stakes, complex information needs, and a multi-party transaction process that creates significant coordination challenges for all participants.` },
      { id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `The residential real estate transaction process is fragmented across multiple platforms, documents, and intermediaries — creating significant friction and anxiety for buyers and sellers. Buyers struggle to reconcile property data from multiple sources, while sellers lack visibility into how their listings are performing and how agents are representing their interests.\n\nAgents, meanwhile, spend disproportionate time on administrative coordination tasks that detract from the relationship-focused work that drives their value.` },
      { id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Research planning and execution.\n\nStakeholder interviews across buyer, seller, and agent groups.\n\nSynthesis and insight development.\n\nDesign strategy and roadmap.\n\nHigh-fidelity prototype development.` },
      { id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Recruiting participants across three distinct stakeholder groups.\n\nReconciling conflicting needs between buyers, sellers, and agents.\n\nNavigating regulatory complexity in real estate transaction design.\n\nDesigning for high-emotional-stakes decisions.` },
      { id: 'synthesis', label: 'Synthesis', layout: 'full',
        content: `Following an intensive research phase involving 34 interviews across buyer, seller, and agent stakeholder groups, I led a synthesis process designed to move from raw data to actionable insights. Affinity mapping sessions with the project team organized observations into themes, revealing the key tension points and opportunity areas across the transaction lifecycle.\n\nKey insight clusters included the significant emotional weight placed on agent trust and communication, the frustration of information asymmetry between parties, and the unmet need for progress transparency throughout the transaction process.`,
        image: { caption: 'Affinity mapping synthesis — clustering insights across 34 stakeholder interviews', src: 'assets/projects/real-estate/remember-the-future.png', bg: '#f5f0e8' } },
      { id: 'inventories', label: 'Inventories', layout: 'full',
        content: `A competitive and comparative analysis phase catalogued the existing landscape of real estate platforms, identifying patterns in how current tools address — and fail to address — the needs identified in research. This inventory revealed significant white space in the area of transaction transparency and multi-party coordination tools.\n\nThe inventory findings helped focus the design strategy on differentiated opportunities rather than replicating features already well-served by existing platforms.` },
      { id: 'studymeasures', label: 'Study Measures', layout: 'full',
        content: `To ensure the platform concept could be objectively evaluated, I established a set of study measures tied to the core user needs identified in research. These measures — centered on perceived trust, transaction clarity, and coordination efficiency — served as evaluation criteria for prototype testing and design decision-making throughout the project.\n\nEstablishing these measures early in the process created alignment across the project team and client stakeholders around what success would look like for the platform.`,
        image: { caption: 'Study measurement framework — transaction clarity and trust metrics', src: 'assets/projects/real-estate/wireflows.png', bg: '#f0f4f0' } },
      { id: 'earlyproto', label: 'Early Prototyping', layout: 'full',
        content: `Low and mid-fidelity prototypes were developed to test the core interaction concepts with research participants. Multiple rounds of testing explored different approaches to the property search experience, transaction status dashboard, and agent-client communication interface.\n\nEach round of testing produced specific, actionable design refinements. Most significantly, testing revealed that buyers wanted a unified "transaction hub" view — a single destination showing all parties, documents, milestones, and communications — rather than the tabbed structure used in initial prototypes.`,
        image: { caption: 'Early prototypes — property search, transaction dashboard, and agent communication', src: 'assets/projects/real-estate/high-level-flow.png', bg: '#f0f5f2' } },
      { id: 'refinedproto', label: 'Refined Prototypes', layout: 'full',
        content: `High-fidelity prototypes incorporating findings from early testing were developed for the three core platform areas: property discovery, transaction management, and agent-client collaboration. These prototypes reflected a refined design language and interaction model validated through iterative testing.`,

/* In-page section nav — Poppins Medium 12px; active = muted green + dot */
function SectionNav({ sections, activeId, mobileOnly = false, desktopOnly = false }) {
  const [open, setOpen] = useState(false);
  const menuRef = useRef(null);

  // Close dropdown when clicking outside
  useEffect(() => {
    function handleClick(e) {
      if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  // Build display list: merge half-left + half-right into a single combined nav item
  const navList = [];
  const skipIds = new Set();
  sections.forEach(sec => {
    if (skipIds.has(sec.id)) return;
    if (sec.layout === 'half-left' && sec.pairId) {
      const pair = sections.find(s => s.id === sec.pairId);
      if (pair) {
        navList.push({ id: sec.id, pairId: pair.id, label: 'Contributions & Challenges' });
        skipIds.add(pair.id);
        return;
      }
    }
    if (sec.layout === 'half-right') return;
    navList.push({ id: sec.id, label: sec.label });
  });

  const activeLabel = navList.find(s => s.id === activeId || s.pairId === activeId)?.label || 'Sections';

  const navLinks = navList.map(sec => {
    const active = sec.id === activeId || sec.pairId === activeId;
    return (
      <a key={sec.id} href={`#section-${sec.id}`}
        className={active ? 'active' : ''}
        onClick={() => setOpen(false)}
        style={{ fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 12,
          lineHeight: 1.3, letterSpacing: '0.01em',
          color: active ? C.greenMuted : C.green,
          textDecoration: 'none',
          display: 'flex', alignItems: 'flex-start', gap: 6,
        }}>
        <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.greenMuted,
          flexShrink: 0, marginTop: 4, opacity: active ? 1 : 0 }} />
        <span>{sec.label}</span>
      </a>
    );
  });

  if (mobileOnly) return (
    <div className="section-nav-hamburger" ref={menuRef} style={{ position: 'relative', display: 'inline-block' }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: C.white, border: `1px solid ${C.greenSubtle}`,
          borderRadius: 8, padding: '8px 14px', cursor: 'pointer',
          fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 13,
          color: C.green,
        }}
        aria-expanded={open}
        aria-label="Section navigation"
      >
        <span style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
          <span style={{ display: 'block', width: 12, height: 2, background: C.green, borderRadius: 2 }} />
          <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
        </span>
        <span style={{ fontSize: 10, color: C.greenMuted }}>{open ? '▲' : '▼'}</span>
      </button>
      <div className={`snav-dropdown${open ? ' open' : ''}`}>
        {navList.map(sec => {
          const active = sec.id === activeId || sec.pairId === activeId;
          return (
            <a key={sec.id} href={`#section-${sec.id}`}
              className={active ? 'active' : ''}
              onClick={() => setOpen(false)}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.greenMuted,
                flexShrink: 0, opacity: active ? 1 : 0 }} />
              {sec.label}
            </a>
          );
        })}
      </div>
    </div>
  );

  if (desktopOnly) return (
    <div className="section-nav-sidebar" style={{
      position: 'sticky', top: 80, alignSelf: 'flex-start',
      display: 'flex', flexDirection: 'column', gap: 20, minWidth: 130,
    }}>
      {navLinks}
    </div>
  );

  return (
    <>
      {/* Desktop sidebar */}
      <div className="section-nav-sidebar" style={{
        position: 'sticky', top: 80, alignSelf: 'flex-start',
        display: 'flex', flexDirection: 'column', gap: 20, minWidth: 130,
      }}>
        {navLinks}
      </div>

      {/* Mobile hamburger */}
      <div className="section-nav-hamburger" ref={menuRef}>
        <button
          onClick={() => setOpen(o => !o)}
          style={{
            display: 'flex', alignItems: 'center', gap: 8,
            background: C.white, border: `1px solid ${C.greenSubtle}`,
            borderRadius: 8, padding: '8px 14px', cursor: 'pointer',
            fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 13,
            color: C.green,
          }}
          aria-expanded={open}
          aria-label="Section navigation"
        >
          <span style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
            <span style={{ display: 'block', width: 12, height: 2, background: C.green, borderRadius: 2 }} />
            <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
          </span>
          <span>{activeLabel}</span>
          <span style={{ marginLeft: 4, fontSize: 10, color: C.greenMuted }}>{open ? '▲' : '▼'}</span>
        </button>
        <div className={`snav-dropdown${open ? ' open' : ''}`}>
          {navList.map(sec => {
            const active = sec.id === activeId || sec.pairId === activeId;
            return (
              <a key={sec.id} href={`#section-${sec.id}`}
                className={active ? 'active' : ''}
                onClick={() => setOpen(false)}>
                <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.greenMuted,
                  flexShrink: 0, opacity: active ? 1 : 0 }} />
                {sec.label}
              </a>
            );
          })}
        </div>
      </div>
    </>
  );
}

function CaseStudyPage({ projectId, onBack, onProject }) {
  const project = PROJECTS.find(p => p.id === projectId) || PROJECTS[0];
  const projIdx = PROJECTS.findIndex(p => p.id === project.id);
  const prevProj = projIdx > 0 ? PROJECTS[projIdx - 1] : PROJECTS[PROJECTS.length - 1];
  const nextProj = projIdx < PROJECTS.length - 1 ? PROJECTS[projIdx + 1] : PROJECTS[0];
  const [activeId, setActiveId] = useState(project.sections[0]?.id || '');
  const anchorRefs = useRef({});

  useEffect(() => {
    setActiveId(project.sections[0]?.id || '');
    window.scrollTo({ top: 0 });
  }, [projectId]);

  // Scroll-based active section tracking
  useEffect(() => {
    if (!project.sections.length) return;
    const HEADER = 110;
    function onScroll() {
      const threshold = HEADER + 40;
      let best = project.sections[0].id;
      project.sections.forEach(sec => {
        const el = anchorRefs.current[sec.id];
        if (!el) return;
        const top = el.getBoundingClientRect().top;
        if (top <= threshold) best = sec.id;
      });
      setActiveId(best);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [projectId]);

  if (!project.sections.length) {
    return (
      <main style={{ paddingTop: 110, paddingLeft: 100, paddingRight: 100, paddingBottom: 120 }}>
        <div style={{ marginBottom: 32 }}>
          <NavLink label="← Back" onClick={onBack} />
        </div>
        <div style={{ fontFamily: "'Poppins', sans-serif", fontWeight: 200, fontSize: 52, color: C.ink }}>{project.title}</div>
        <div style={{ fontFamily: "'Poppins', sans-serif", fontSize: 22, color: C.gray, marginTop: 10 }}>{project.category}</div>
        <p style={{ fontFamily: "'Open Sans', sans-serif", fontSize: 15, color: C.gray, marginTop: 40, lineHeight: 1.7 }}>Full case study coming soon.</p>
      </main>
    );
  }

  const rendered = new Set();

  return (
    <main style={{ paddingTop: 96, paddingBottom: 120 }}>
      <div className="case-study-back" style={{ paddingLeft: 100, paddingBottom: 32 }}>
        <NavLink label="← Back" onClick={onBack} />
      </div>
      {/* Hamburger — narrow screens only, sits above the card */}
      <div className="case-study-back hamburger-wrap" style={{ paddingLeft: 32, paddingRight: 32, marginBottom: 16, position: 'sticky', top: 72, zIndex: 100 }}>
        <SectionNav sections={project.sections} activeId={activeId} mobileOnly />
      </div>

      <div className="case-study-inner" style={{ display: 'flex', gap: 60, paddingLeft: 100, paddingRight: 80, maxWidth: 1300 }}>

        {/* Sidebar nav — wrapper + inner both hidden on narrow screens */}
        <div className="section-nav-sidebar-wrap" style={{ width: 130, flexShrink: 0 }}>
          <SectionNav sections={project.sections} activeId={activeId} desktopOnly />
        </div>

        {/* Main card */}
        <div style={{
          flex: 1, maxWidth: 860,
          borderRadius: 20, border: `1px solid ${C.greenSubtle}`,
          background: C.white, padding: '40px 48px',
        }}>
          {/* Title block */}
          {/* Title block */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 24, marginBottom: 48 }}>
            {(project.cardImg || project.logo) && (
              <img src={project.cardImg || project.logo} alt={project.title}
                style={{ width: 100, height: 100, objectFit: 'contain', flexShrink: 0 }} />
            )}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div style={{ fontFamily: "'Poppins', sans-serif", fontWeight: 200, fontSize: 48, color: C.ink, lineHeight: 1 }}>
                {project.title}
              </div>
              <div style={{ fontFamily: "'Poppins', sans-serif", fontSize: 22, color: C.gray, lineHeight: 1 }}>
                {project.category}
              </div>
            </div>
          </div>

          {/* Sections */}
          {project.sections.map((sec) => {
            if (rendered.has(sec.id)) return null;

            if (sec.layout === 'full' || sec.layout === 'outcomes') {
              rendered.add(sec.id);
              return (
                <div key={sec.id} id={`section-${sec.id}`} className="section-anchor"
                  ref={el => anchorRefs.current[sec.id] = el} style={{ marginBottom: 48 }}>
                  <SectionHeader label={sec.label} />
                  {sec.id === 'outcomes' ? <BulletList content={sec.content} /> : <BodyText>{sec.content}</BodyText>}

                  <div id={`section-${sec.id}`} className="section-anchor"
                    ref={el => anchorRefs.current[sec.id] = el}
                    style={{ borderRadius: 10, border: `1px solid ${C.greenLight}`, padding: '24px 26px' }}>
                    <SectionHeader label={sec.label} />
                    <BodyText>{sec.content}</BodyText>
                  </div>
                  {pair && (
                    <div id={`section-${pair.id}`} className="section-anchor"
                      ref={el => anchorRefs.current[pair.id] = el}
                      style={{ borderRadius: 10, border: `1px solid ${C.greenLight}`, padding: '24px 26px' }}>
                      <SectionHeader label={pair.label} />
                      <BodyText>{pair.content}</BodyText>
                    </div>
                  )}
                </div>
              );
            }

            if (sec.layout === 'details') {
              rendered.add(sec.id);
              return (
                <div key={sec.id} id={`section-${sec.id}`} className="section-anchor"
                  ref={el => anchorRefs.current[sec.id] = el} style={{ marginBottom: 0 }}>
                  {sec.subsections.map((sub, i) => (
                    <div key={i} style={{ marginBottom: i < sec.subsections.length - 1 ? 40 : 0 }}>
                      <SectionHeader label={sub.label} />
                      <BodyText>{sub.content}</BodyText>
                    </div>
                  ))}
                </div>
              );
            }

            return null;
          })}

          {/* Prev / Next case study */}
          <div style={{
            marginTop: 56, paddingTop: 32,
            borderTop: `1px solid ${C.greenSubtle}`,
            display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16,
          }}>

/* ── ROOT ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "gridColumns": 3,
  "cardRadius": 16,
  "heroSize": 56
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen]     = useState(() => localStorage.getItem('je-v2-screen') || 'home');
  const [tweaks, setTweaks]     = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    localStorage.setItem('je-v2-screen', screen);
    if (!screen.startsWith('project-')) window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [screen]);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function setTweak(k, v) {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  }

  return (
    <div style={{ background: C.warmWhite, minHeight: '100vh' }}>
      <Header screen={screen} onNav={dest => setScreen(dest)} />

      {screen === 'home'    && <HomePage onProject={id => setScreen('project-' + id)} />}
      {screen === 'about'   && <AboutPage />}
      {screen === 'resume'  && <ResumePage />}
      {screen.startsWith('project-') && (
        <CaseStudyPage projectId={screen.replace('project-', '')} onBack={() => setScreen('home')} onProject={id => setScreen('project-' + id)} />
      )}

      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 999,
          background: C.white, border: `1px solid ${C.greenSubtle}`,
          borderRadius: 12, padding: '20px 24px', minWidth: 240,
          boxShadow: '0 8px 32px rgba(0,0,0,0.10)',
          fontFamily: "'Poppins', sans-serif",
        }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: C.ink, marginBottom: 18, borderBottom: `1px solid ${C.greenSubtle}`, paddingBottom: 10 }}>Tweaks</div>
          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.gray, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Grid columns — {tweaks.gridColumns}</div>
            <input type="range" min={1} max={4} step={1} value={tweaks.gridColumns}
              onChange={e => setTweak('gridColumns', Number(e.target.value))}
              style={{ width: '100%', accentColor: C.green }} />
          </label>
          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.gray, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Card radius — {tweaks.cardRadius}px</div>
            <input type="range" min={0} max={32} step={2} value={tweaks.cardRadius}
              onChange={e => setTweak('cardRadius', Number(e.target.value))}
              style={{ width: '100%', accentColor: C.green }} />
          </label>
          <label style={{ display: 'block' }}>
            <div style={{ fontSize: 11, color: C.gray, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Hero size — {tweaks.heroSize}px</div>
            <input type="range" min={36} max={80} step={2} value={tweaks.heroSize}
              onChange={e => setTweak('heroSize', Number(e.target.value))}
              style={{ width: '100%', accentColor: C.green }} />
          </label>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
