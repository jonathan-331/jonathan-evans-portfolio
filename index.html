<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Capture helpers: expose all fade-in elements immediately when in capture mode
const _captureModeActive = window.location.hash.includes('figmacapture');
if (_captureModeActive) {
  const style = document.createElement('style');
  style.textContent = '.fade-in { opacity: 1 !important; transform: none !important; transition: none !important; }';
  document.head.appendChild(style);
}
// Support ?screen=X URL param to render a specific view for capture
const _screenParam = new URLSearchParams(window.location.search).get('screen');

const C = {
  ink:         'rgb(26,27,31)',
  green:       'rgb(55,126,34)',
  greenMuted:  'rgb(118,153,116)',
  greenLight:  'rgb(212,219,214)',
  greenSubtle: 'rgb(233,237,234)',
  warmWhite:   'rgb(247,249,246)',
  white:       '#fff',
  gray:        'rgb(158,158,158)',
};

/* ── FADE IN ── */
function useFadeIn(delay = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
      { threshold: 0.08 }
    );
    const t = setTimeout(() => obs.observe(el), delay);
    return () => { clearTimeout(t); obs.disconnect(); };
  }, [delay]);
  return ref;
}

/* ── NAV LINK — Poppins Medium 12px green; active = muted green + underline ── */
function NavLink({ label, active, onClick, href }) {
  const [hov, setHov] = useState(false);
  return (
    <a
      href={href || '#'}
      target={href && href.startsWith('http') ? '_blank' : undefined}
      rel={href && href.startsWith('http') ? 'noopener noreferrer' : undefined}
      onClick={e => { if (!href || href === '#') { e.preventDefault(); onClick && onClick(); } }}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        fontFamily: "'Poppins', sans-serif",
        fontWeight: 500,
        fontSize: 12,
        lineHeight: 1,
        color: active ? C.greenMuted : C.green,
        textDecoration: active ? 'underline' : 'none',
        textUnderlineOffset: '5px',
        cursor: 'pointer',
        letterSpacing: '0.01em',
        display: 'flex',
        alignItems: 'center',
        padding: '5px 8px',
        borderRadius: 6,
        background: (hov && !active) ? C.warmWhite : 'transparent',
        transition: 'background 0.15s ease',
      }}>
      {label}
    </a>
  );
}

/* ── GREEN LINK (inline hover pill) ── */
function GreenLink({ href, children, style }) {
  const [hov, setHov] = useState(false);
  const external = href && href.startsWith('http');
  return (
    <a
      href={href}
      target={external ? '_blank' : undefined}
      rel={external ? 'noopener noreferrer' : undefined}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        color: C.green, textDecoration: 'none',
        padding: '3px 7px', borderRadius: 5,
        background: hov ? C.warmWhite : 'transparent',
        transition: 'background 0.15s ease',
        ...style,
      }}
    >{children}</a>
  );
}

/* ── SIDE NAV LINK (case study sidebar) ── */
function SideNavLinkItem({ href, label, active, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <a
      href={href}
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 12,
        lineHeight: 1.3, letterSpacing: '0.01em',
        color: active ? C.greenMuted : C.green,
        textDecoration: active ? 'underline' : 'none',
        textUnderlineOffset: '5px',
        display: 'block',
        padding: '4px 8px', borderRadius: 6,
        background: (hov && !active) ? C.warmWhite : 'transparent',
        transition: 'background 0.15s ease',
      }}
    >{label}</a>
  );
}

/* ── HEADER ── */
function Header({ screen, onNav }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 8);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);

    { label: 'About',    dest: 'about' },
    { label: 'Resume',   dest: 'resume' },
    { label: 'LinkedIn', href: 'https://www.linkedin.com/in/jonathanhevans/', dest: null },
    { label: 'Email Me',  href: 'mailto:jonathan@jonathan-evans.com', dest: null },
  ];

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200,
      height: 64, background: C.white,
      boxShadow: scrolled ? '0px 4px 4px 0px rgba(0,0,0,0.25)' : '0px 1px 0px 0px rgba(0,0,0,0.06)',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',

    }} className="site-header">

        style={{ height: 36, cursor: 'pointer', flexShrink: 0 }} />
      <nav className="header-nav" style={{ display: 'flex', gap: 40, alignItems: 'center', marginLeft: 'auto' }}>
        {navItems.map(item => (
          <NavLink
            key={item.label}
            label={item.label.toUpperCase()}
            active={screen === item.dest}
            href={item.href}
            onClick={item.dest ? () => onNav(item.dest) : undefined}
          />
        ))}
      </nav>
    </header>
  );
}

    desc: 'Orchestrated a complex UX research initiative involving 91 NASA scientists to uncover critical friction points and optimize global satellite data utilization.',
    sections: [
      {
        id: 'overview', label: 'Overview', layout: 'full',
        content: `I led a research project to understand the challenges scientists were facing in accessing and utilizing satellite data from NASA's 12 Distributed Active Archive Centers (DAACs). Through in-depth interviews with 91 scientists using 11 different DAAC websites, I identified key user types and pain points in the data access process.\n\nKey findings included significant variability in user experience across different DAACs, a lack of awareness of available data resources, and challenges in understanding and utilizing complex data formats. The research findings informed the development of new improved user experiences across the DAACs, leading to a significant increase in scientist satisfaction and data utilization.`,
      },
      {
        id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `Despite NASA's significant investments in providing scientists with access to valuable satellite data through its DAACs, scientists were not utilizing these resources. This research aimed to understand the underlying reasons for the lack of scientist engagement, including identifying barriers to data access, understanding user needs, and evaluating the effectiveness of data dissemination across the different DAACs.\n\nThe goal was to identify key areas for improvement in data access and utilization to improve scientist engagement, leading to an increase in scientific discoveries.`,
      },
      {
        id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Led all aspects of the research project, including data collection, analysis, and reporting.\n\nDeveloped and analyzed qualitative data, including user interviews and observations.\n\nCreated user personas and journey maps to represent the diverse needs and behaviors of scientists.\n\nDeveloped actionable recommendations for improving data access, utilization, and user experience across the DAACs.\n\nPrepared and presented comprehensive research findings to NASA stakeholders, including key decision-makers and representatives from the DAACs.`,
      },
      {
        id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Coordinating communication and messaging across 12 geographically dispersed DAACs and NASA.\n\nRecruiting a diverse and representative sample of 91 scientists from across the United States and internationally, ensuring adequate representation from each DAAC.\n\nEnsuring data consistency and comparability across diverse datasets collected from scientists using different research methodologies.\n\nAnalyzing and synthesizing a large volume of data from 91 scientists, while ensuring the validity of research findings.\n\nTelling a single narrative with actionable recommendations based on diverse perspectives from multiple scientists.`,
      },
      {
        id: 'recruiting', label: 'Recruiting and Coordinating', layout: 'full',
        content: `Recruiting participants for this research presented significant logistical challenges. To ensure a representative sample, we aimed to recruit 8-10 scientists from each of the 12 DAACs, requiring careful coordination with NASA and each DAAC to identify and contact potential participants. This involved navigating communication across multiple organizations, screening potential participants based on criteria such as recent DAAC usage and research area, and addressing logistical hurdles like scheduling conflicts and time zone differences. Despite these challenges, we successfully recruited a diverse group of 91 scientists, providing a strong foundation for the research.`,
      },
      {
        id: 'retrieving', label: 'Retrieving Data', layout: 'full',
        contentParts: [
          { type: 'text', value: `To observe scientists' interactions with the DAACs, we conducted think-aloud protocols, where participants verbalized their thoughts and actions as they attempted to retrieve sample datasets. Scientists were asked to retrieve data from:` },
          { type: 'bullets', items: ['Their primary DAAC', 'A data-relevant secondary DAAC with which they had less experience'] },
          { type: 'text', value: `This comparative approach allowed us to identify key differences in user experience across different DAACs.\n\nOur findings revealed that while scientists were generally able to find and download data from their primary DAACs, they encountered significant challenges when navigating unfamiliar DAACs. These challenges included difficulty in locating relevant datasets, understanding data formats and documentation, and navigating the websites. These findings highlighted the need for improved user onboarding, standardized interfaces across DAACs, and more comprehensive and user-friendly documentation to enhance data access and utilization.` },
        ],
        image: { caption: "RESULTS TABLE: This table displays the successes the participants had for the different DAACs. 'Primary' indicates it's a DAAC they used regularly. 'Secondary' indicates it's a DAAC they did not use regularly.", src: 'assets/projects/nasa/results-table.png', bg: '#f0f4ea' },
      },
      {
        id: 'workflows', label: 'Capturing Workflows', layout: 'full',
        contentParts: [
          { type: 'text', value: `To understand the intricacies of scientist workflows, we utilized a combination of methods, including semi-structured interviews, task-based scenarios, and a co-creation exercise. Collaborating closely with each participant, we:` },

        ],
        image: { caption: "CO-CREATION EXERCISE: This is an example of a participant's process created in the session to find and use data for a research question.", src: 'assets/projects/nasa/cocreation.png', bg: '#f0f4e8' },
      },
      {
        id: 'usertypes', label: 'User Types', layout: 'full',
        content: `Once we completed the sessions, the analysis presented us with some specific behaviors of the participants. In grouping these behavior patterns, four different user types emerged.\n\nWith an understanding of each of these user types, we were better able to understand how they were performing their research, where they would interact with the DAACs, and where the problems would emerge.`,
        images: [
          { caption: 'USER TYPES: These were the four user types discovered from the research.', src: 'assets/projects/nasa/user-types.png', bg: '#eef2f8' },
          { caption: 'USER JOURNEYS: This was the main deliverable from the study. It captures the different user journeys for the four user types, and the opportunities for each stage of the journey.', src: 'assets/projects/nasa/user-journeys.png', bg: '#f5f2e8' },
        ],
      },
      {
        id: 'findings', label: 'Findings and Design Suggestions', layout: 'full',
        content: `In order to give resonance to the data, we described the findings in terms of the user types. We analyzed how each user type approached finding and retrieving data across the DAACs, highlighting the unique challenges and opportunities presented by each user group.\n\nWhile this was a research project, I leveraged my design skills to translate the findings into actionable recommendations. I created a series of wireframes demonstrating how common design elements, such as standardized search interfaces, consistent data visualizations, and a centralized user onboarding experience, could be implemented across the DAACs to improve data discoverability and overall user experience. My final presentation to NASA and DAAC representatives went through the findings and discussed the feasibility of the proposed design solutions.`,
        image: { caption: 'WIREFRAME SUGGESTION: This is an example of a high level wireframe created for the final deliverable.', src: 'assets/projects/nasa/wireframe-suggestion.png', bg: '#f0f5f2' },

      {

            'Observing the positive impact of our work firsthand when I saw the user journey posters displayed prominently within NASA facilities, demonstrating the value and impact of the research findings.',

      {

        content: `To ensure a focused and impactful project, we collaborated closely with the client to define the project. Through a collaborative workshop utilizing an affinity mapping exercise, we prioritized identified challenges and opportunities. This process enabled us to clearly define the scope of the project, focusing on the most critical issues for immediate resolution while acknowledging and prioritizing potential future enhancements.`,

      {

        content: `To clarify the desired product vision, we presented the client with a spectrum of adjectives representing different product philosophies. We then conducted a voting exercise with key stakeholders, asking them to rank the adjectives based on their importance for the success of the project. This collaborative exercise facilitated a productive discussion about the desired product characteristics and helped to build consensus among stakeholders. The results provided valuable insights into the client's priorities and guided subsequent design and development decisions.`,

      {
        id: 'outofroom', label: 'Out of the Room Thinking', layout: 'full',
        contentParts: [
          { type: 'text', value: `To ensure that we explored a diverse range of design possibilities and avoided premature consensus, we implemented a technique to encourage divergent thinking and prevent groupthink. We did this by:` },
          { type: 'bullets', items: ['Providing each designer with the same design challenge and instructing them to independently brainstorm and sketch unique design solutions', 'Facilitating a group discussion where designers presented their sketches, shared their thought processes, and provided constructive feedback', 'Identifying the most promising design concepts that revised our overall design direction, ensuring that the final solution was innovative, user-centered, and aligned with the client\'s vision.'] },
        ],
        image: { caption: 'CONCEPT CARDS: These demonstrated some design thinking we identified in a brainstorm exercise.', src: 'assets/projects/power-plants/concept-cards.png', bg: '#eef0f5' },
      },
      {
        id: 'journeymap', label: 'Journey Map', layout: 'full',
        content: `Once we had established the business direction, we focused on a key user type who frequently interacted with the system. The goal of this journey map was to understand interactions with the system at every stage, identify pain points and opportunities for improvement, and ensure that the design solution effectively met the needs and expectations of the users.`,

      {
        id: 'storyboards', label: 'Storyboards / Wireflows', layout: 'full',
        content: `Storyboards are a valuable tool for visualizing basic design concepts and interactions to stakeholders. I often extend the storyboard process by developing wireflows, which combine the visual clarity of wireframes with the dynamic flow of user interactions. Wireflows effectively communicate the sequence of screens and the user's actions within the application, providing a more comprehensive understanding of the user experience. I utilize storyboards and/or wireflows iteratively, gathering feedback from stakeholders to solidify the unified vision and design direction.`,

      {
        id: 'rethinking', label: 'Rethinking the Structure', layout: 'full',
        content: `The existing information architecture of the product was complex, characterized by inconsistent navigation, poorly organized content, and a lack of clear user pathways. To address this, I reviewed user research to understand how users currently interacted with the system and identified their information needs. Based on these insights, I developed a new information architecture that was more intuitive and aligned with user workflows. The resulting information architecture provided a solid foundation for the design and development of a more user-centered and efficient product.`,

        content: `Once the information architecture and high-level interactions were established, the next step was to translate these concepts into concrete design solutions through the creation of detailed wireframes. Given the evolving nature of the project and the potential for future enhancements and customization, it was critical to create a flexible and adaptable design system. I utilized Sketch to create the initial wireframes, and today I would likely have used Figma due to its prototyping capabilities.`,

            '<b>User Satisfaction:</b> The client reported that users were happy with the design direction.',

    desc: 'Architected the interaction models for Moen\'s next-generation voice-controlled product, delivering an award-winning product named one of Better Homes & Gardens\' Top 30 Most Innovative Products.',
    sections: [
      {
        id: 'overview', label: 'Overview', layout: 'full',
        content: `Moen wanted to bring voice interaction into their U by Moen shower. They wanted the ability to use that interaction on any voice device, but not build the voice interaction into the shower itself.`,
      },
      {
        id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `How could we bring a voice interaction into a shower with a device that is not attached to the shower? What is the likelihood that users would actually interact with the shower via voice?`,

      {
        id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',

      {
        id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Identifying the interactions.\n\nCapturing a shower experience without the shower.\n\nIdentifying terms for the interactions.\n\nCreating the final deliverable.`,
      },
      {
        id: 'whatcanitdo', label: 'What Can It Do', layout: 'full',
        content: `To understand what interactions needed to be the focus of this product, I determined what users might want to say to a voice-controlled shower. I accomplished this through brainstorming the common activities they might want to try.`,
        image: { caption: 'UTTERANCE EXPLORATION: Exploring the voice interactions for an initial prototype.', src: 'assets/projects/moen/utterance-exploration.png', bg: '#eef2f5' },

      {
        id: 'process', label: 'Understanding the Process', layout: 'full',
        content: `Once I had a sense of what people might attempt to do, I mapped out different possible high level interactions.`,

      },
      {
        id: 'actionreaction', label: 'Action and Reaction', layout: 'full',
        content: `Once the high level flows were then confirmed with the client, I focused on capturing the exact type of interactions we would want to capture in a prototype to be used for research sessions.`,
        image: { caption: 'ALEXA INTERACTIONS: Capturing the interactions with Alexa for the prototype.', src: 'assets/projects/moen/alexa-interactions.png', bg: '#f5f0f8' },
      },
      {
        id: 'capturinginteraction', label: 'Capturing the Interaction', layout: 'full',
        content: `I then took the suggested Alexa interactions and captured what exactly the shower display would do. This would be used in the implementation of the prototype for the research sessions.`,
        image: { caption: 'U BY MOEN INTERACTIONS: More detailed interactions with the shower control for the prototype.', src: 'assets/projects/moen/interactions.png', bg: '#f2f5f8' },
      },
      {
        id: 'labresearch', label: 'Lab Research', layout: 'full',
        contentParts: [
          { type: 'text', value: `To truly capture how people would use this product, I needed to observe their process. But it would be very awkward to ask to observe people in the shower. So I created a setup that would mirror a shower with the U by Moen installed. I did this by:` },
          { type: 'bullets', items: [
            'Using an iPad with a U by Moen prototype on it to create visual and auditory feedback',
            'Displaying U by Moen interfaces on the inside and outside of the shower environment to allow for the most popular set-ups',
            'Having white boards set up as to replicate a standard shower environment',

          { type: 'text', value: `I then asked participants that were recruited based on the likelihood of having such a product to walk me through a shower experience that they might have using an Echo with a U by Moen.` },

        id: 'howitworks', label: 'How People Actually Wanted to Interact', layout: 'full',
        contentParts: [
          { type: 'text', value: `The research revealed two things:` },
          { type: 'ordered', items: [

        id: 'interactiondiagrams', label: 'Interaction Diagrams', layout: 'full',

  { id: 'gaming', title: 'Gaming', subtitle: '', category: 'Research', cardImg: 'assets/cards/gaming.png', tags: ['UX Research', 'Design Strategy', 'Personas'], desc: 'Led specialized UX research initiative in the card gaming sector, decoding player emotion and initial engagement dynamics to optimize the gameplay experience.',
    sections: [
      { id: 'overview', label: 'Overview', layout: 'full',
        content: `A well known card game company wanted to understand how children learned how to play their game. Research sessions were designed to evaluate the learnability of current game, with the current poster-style instructions vs a new booklet-style instructions. 10 pairs of participants were recruited, with half being adult-child and the other half being child-child. Participants were asked about how they typically learned new games and what types of games they played. They were then presented with the game and given time to read the instructions and play. Finally, participants were asked to give feedback about their overall experience.` },
      { id: 'problem', label: 'The Problem', layout: 'highlight',
        content: `What is the best format of directions for kids to learn how to play a game? What challenges do kids come across learning from the different formats?` },
      { id: 'contributions', label: 'My Contributions', layout: 'half-left', pairId: 'challenges',
        content: `Research lead.\n\nDetermine recruiting criteria.\n\nStructured session and lab set-up.\n\nUser interviews.\n\nData analysis.\n\nFinal documentation and presentation creation.` },
      { id: 'challenges', label: 'Challenges', layout: 'half-right', pairId: 'contributions',
        content: `Recruiting the right pairs.\n\nHaving kids learn from each other.\n\nSetting up the lab to capture the interactions and making the kids and adults feel at ease.` },
      { id: 'cardscards', label: 'Cards, Cards, Cards', layout: 'full',
        contentParts: [
          { type: 'text', value: `Most of the user research I'd done in the past revolved around digital experiences, so thinking about how to set up a study around multiple people playing a physical game with instructions was a unique challenge. I had to figure out how to:` },
          { type: 'bullets', items: [
            'Allow participants to discover the physical instructions',
            'Enable participants to figure out how to play the game on their own',
            'Capture all of the actions, activity, and expressions',
          ]},
          { type: 'text', value: `The session guide/script focused on the research questions we had in mind, and was largely structured as reminders to make sure certain questions were answered. But the true challenge was getting the camera set-up right. What I settled on with the IT crew was having an overhead shot that captured the playing and instructions, and two side camera shots that captured the reactions, with a microphone attached to the crane for the overhead shot.` },
        ],
        image: { caption: 'CAMERA SETUP: This diagram demonstrates what would be captured in the recording of the participants in session.', src: 'assets/projects/gaming/camera-setup.png', bg: '#f5f2e8' } },
      { id: 'gauging', label: 'Gauging Children Responses', layout: 'full',
        content: `Besides the general reactions of the children and their statements, I've found it useful to use a tool to get them to think about how they're feeling about a product or interaction. For adult-based research, I use a regular Likert scale. For children, it helps to have a little more something for them to respond to so I used a Smile-O-Meter, which is a Likert scale with emoticons associated with the different reactions.`,
        image: { caption: 'SMILE-O-METER: The kid-friendly Likert scale used during the sessions.', src: 'assets/projects/gaming/smile-o-meter.png', bg: '#f8f5e8' } },
      { id: 'results', label: 'Results', layout: 'full',
        contentParts: [
          { type: 'text', value: `I used the Smile-O-Meter at specific points throughout the game, followed by asking the participants their reason for the rating. These points were:` },
          { type: 'bullets', items: [
            'At the start of the session, with the anticipation of playing',
            'After the participants had mainly finished with the instructions',
            'At the end of the session, once the participants started putting the game away',
          ]},
          { type: 'text', value: `The findings were definitely interesting. The poster-style provided a quick reference but participants found it cumbersome and would not flip it over. Meanwhile, participants liked reading from the booklet-style, but would get to a particular page that would convince them they could start playing before totally comprehending the game. At the end of each session, it was clear that participant enjoyment of the game was related to how cumbersome they found learning the game.` },
        ],
        image: { caption: 'PARTICIPANT ENJOYMENT LEVELS: Graph showing how the different participant groups responded to learning the game throughout the sessions.', src: 'assets/projects/gaming/enjoyment-levels.png', bg: '#f0f5f0' } },
      { id: 'outcomes', label: 'Outcomes', layout: 'full',
        contentParts: [
          { type: 'text', value: `The outcomes of this research have yet to be seen. However, the gaming company was moving forward with the suggestions which included:` },

          ]},
        ],
      },

/* ── CASE STUDY PAGE ── */
function SectionHeader({ label }) {
  return (
    <div style={{
      fontFamily: "'Poppins', sans-serif", fontWeight: 400, fontSize: 19,
      color: C.ink, lineHeight: 1,
      borderBottom: `1px solid ${C.greenMuted}`,
      paddingBottom: 8, marginBottom: 14,
    }}>{label}</div>
  );
}

function BodyText({ children }) {
  return (
    <div style={{
      fontFamily: "'Open Sans', sans-serif", fontSize: 15,
      lineHeight: 1.75, color: C.ink, whiteSpace: 'pre-line',
    }}>{children}</div>
  );
}

function renderRichText(text) {
  const parts = text.split(/(<b>.*?<\/b>)/g);
  return parts.map((part, i) => {
    const match = part.match(/^<b>(.*?)<\/b>$/);
    if (match) return <strong key={i}>{match[1]}</strong>;
    return part;
  });
}

function BulletList({ content, items: itemsProp }) {
  const items = itemsProp || String(content).split(/\n\s*\n+/).map(s => s.trim()).filter(Boolean);
  return (
    <ul style={{
      fontFamily: "'Open Sans', sans-serif", fontSize: 15,
      lineHeight: 1.7, color: C.ink,
      listStyle: 'none', padding: 0, margin: 0,
      display: 'flex', flexDirection: 'column', gap: 10,
    }}>
      {items.map((item, i) => (
        <li key={i} style={{ display: 'flex', gap: 14, alignItems: 'baseline' }}>
          <span style={{ flex: '0 0 6px', height: 6, borderRadius: '50%', background: C.green, marginTop: 9, transform: 'translateY(-1px)' }} />
          <span style={{ flex: 1 }}>{renderRichText(item)}</span>
        </li>
      ))}
    </ul>
  );
}

function OrderedList({ items }) {
  return (
    <ol style={{
      fontFamily: "'Open Sans', sans-serif", fontSize: 15,
      lineHeight: 1.7, color: C.ink,
      listStyle: 'none', padding: 0, margin: 0,
      display: 'flex', flexDirection: 'column', gap: 10,
    }}>
      {items.map((item, i) => (
        <li key={i} style={{ display: 'flex', gap: 14, alignItems: 'baseline' }}>
          <span style={{ flex: '0 0 18px', fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 13, color: C.green }}>{i + 1}.</span>
          <span style={{ flex: 1 }}>{renderRichText(item)}</span>
        </li>
      ))}
    </ol>
  );
}

function ContentRenderer({ content, contentParts, isOutcomes }) {
  if (contentParts) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {contentParts.map((part, i) => {
          if (part.type === 'text') return <BodyText key={i}>{part.value}</BodyText>;
          if (part.type === 'bullets') return <BulletList key={i} items={part.items} />;
          if (part.type === 'ordered') return <OrderedList key={i} items={part.items} />;
          return null;
        })}
      </div>
    );
  }
  if (isOutcomes) return <BulletList content={content} />;
  return <BodyText>{content}</BodyText>;
}

/* In-page section nav — Poppins Medium 12px; active = muted green + dot */
function SectionNav({ sections, activeId, mobileOnly = false, desktopOnly = false }) {
  const [open, setOpen] = useState(false);
  const menuRef = useRef(null);

  // Close dropdown when clicking outside
  useEffect(() => {
    function handleClick(e) {
      if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  // Build display list: merge half-left + half-right into a single combined nav item
  const navList = [];
  const skipIds = new Set();
  sections.forEach(sec => {
    if (skipIds.has(sec.id)) return;
    if (sec.layout === 'half-left' && sec.pairId) {
      const pair = sections.find(s => s.id === sec.pairId);
      if (pair) {
        navList.push({ id: sec.id, pairId: pair.id, label: 'Contributions & Challenges' });
        skipIds.add(pair.id);
        return;
      }
    }
    if (sec.layout === 'half-right') return;
    navList.push({ id: sec.id, label: sec.label });
  });

  const activeLabel = navList.find(s => s.id === activeId || s.pairId === activeId)?.label || 'Sections';

  const navLinks = navList.map(sec => {
    const active = sec.id === activeId || sec.pairId === activeId;
    return (
      <SideNavLinkItem
        key={sec.id}
        href={`#section-${sec.id}`}
        label={sec.label}
        active={active}
        onClick={() => setOpen(false)}
      />
    );
  });

  if (mobileOnly) return (
    <div className="section-nav-hamburger" ref={menuRef} style={{ position: 'relative', display: 'inline-block' }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: C.white, border: `1px solid ${C.greenSubtle}`,
          borderRadius: 8, padding: '8px 14px', cursor: 'pointer',
          fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 13,
          color: C.green,
        }}
        aria-expanded={open}
        aria-label="Section navigation"
      >
        <span style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
          <span style={{ display: 'block', width: 12, height: 2, background: C.green, borderRadius: 2 }} />
          <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
        </span>
        <span style={{ fontSize: 10, color: C.greenMuted }}>{open ? '▲' : '▼'}</span>
      </button>
      <div className={`snav-dropdown${open ? ' open' : ''}`}>
        {navList.map(sec => {
          const active = sec.id === activeId || sec.pairId === activeId;
          return (
            <a key={sec.id} href={`#section-${sec.id}`}
              className={active ? 'active' : ''}
              onClick={() => setOpen(false)}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.greenMuted,
                flexShrink: 0, opacity: active ? 1 : 0 }} />
              {sec.label}
            </a>
          );
        })}
      </div>
    </div>
  );

  if (desktopOnly) return (
    <div className="section-nav-sidebar" style={{
      display: 'flex', flexDirection: 'column', gap: 20, minWidth: 130,
    }}>
      {navLinks}
    </div>
  );

  return (
    <>
      {/* Desktop sidebar */}
      <div className="section-nav-sidebar" style={{
        position: 'sticky', top: 80, alignSelf: 'flex-start',
        display: 'flex', flexDirection: 'column', gap: 20, minWidth: 130,
      }}>
        {navLinks}
      </div>

      {/* Mobile hamburger */}
      <div className="section-nav-hamburger" ref={menuRef}>
        <button
          onClick={() => setOpen(o => !o)}
          style={{
            display: 'flex', alignItems: 'center', gap: 8,
            background: C.white, border: `1px solid ${C.greenSubtle}`,
            borderRadius: 8, padding: '8px 14px', cursor: 'pointer',
            fontFamily: "'Poppins', sans-serif", fontWeight: 500, fontSize: 13,
            color: C.green,
          }}
          aria-expanded={open}
          aria-label="Section navigation"
        >
          <span style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
            <span style={{ display: 'block', width: 12, height: 2, background: C.green, borderRadius: 2 }} />
            <span style={{ display: 'block', width: 16, height: 2, background: C.green, borderRadius: 2 }} />
          </span>
          <span>{activeLabel}</span>
          <span style={{ marginLeft: 4, fontSize: 10, color: C.greenMuted }}>{open ? '▲' : '▼'}</span>
        </button>
        <div className={`snav-dropdown${open ? ' open' : ''}`}>
          {navList.map(sec => {
            const active = sec.id === activeId || sec.pairId === activeId;
            return (
              <a key={sec.id} href={`#section-${sec.id}`}
                className={active ? 'active' : ''}
                onClick={() => setOpen(false)}>
                <span style={{ width: 5, height: 5, borderRadius: '50%', background: C.greenMuted,
                  flexShrink: 0, opacity: active ? 1 : 0 }} />
                {sec.label}
              </a>
            );
          })}
        </div>
      </div>
    </>
  );
}

function CaseStudyPage({ projectId, onBack, onProject }) {
  const project = PROJECTS.find(p => p.id === projectId) || PROJECTS[0];
  const projIdx = PROJECTS.findIndex(p => p.id === project.id);
  const prevProj = projIdx > 0 ? PROJECTS[projIdx - 1] : PROJECTS[PROJECTS.length - 1];
  const nextProj = projIdx < PROJECTS.length - 1 ? PROJECTS[projIdx + 1] : PROJECTS[0];
  const [activeId, setActiveId] = useState(project.sections[0]?.id || '');
  const anchorRefs = useRef({});

  useEffect(() => {
    setActiveId(project.sections[0]?.id || '');
    window.scrollTo({ top: 0 });
  }, [projectId]);

  // Scroll-based active section tracking
  useEffect(() => {
    if (!project.sections.length) return;
    const HEADER = 110;
    function onScroll() {
      const threshold = HEADER + 40;
      let best = project.sections[0].id;
      project.sections.forEach(sec => {
        const el = anchorRefs.current[sec.id];
        if (!el) return;
        const top = el.getBoundingClientRect().top;
        if (top <= threshold) best = sec.id;
      });
      setActiveId(best);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [projectId]);

  if (!project.sections.length) {
    return (
      <main style={{ paddingTop: 110, paddingLeft: 100, paddingRight: 100, paddingBottom: 120 }}>
        <div style={{ marginBottom: 32 }}>
          <NavLink label="← Back" onClick={onBack} />
        </div>
        <div style={{ fontFamily: "'Poppins', sans-serif", fontWeight: 200, fontSize: 52, color: C.ink }}>{project.title}</div>
        <div style={{ fontFamily: "'Poppins', sans-serif", fontSize: 22, color: C.gray, marginTop: 10 }}>{project.category}</div>
        <p style={{ fontFamily: "'Open Sans', sans-serif", fontSize: 15, color: C.gray, marginTop: 40, lineHeight: 1.7 }}>Full case study coming soon.</p>
      </main>
    );
  }

  const rendered = new Set();

  return (
    <main style={{ paddingTop: 96, paddingBottom: 120 }}>
      <div className="case-study-back-link case-study-back" style={{ paddingLeft: 100, paddingBottom: 32 }}>
        <NavLink label="← Back" onClick={onBack} />
      </div>
      {/* Hamburger — narrow screens only, sits above the card */}
      <div className="case-study-back hamburger-wrap" style={{ paddingLeft: 32, paddingRight: 32, marginBottom: 16, position: 'sticky', top: 72, zIndex: 100 }}>
        <SectionNav sections={project.sections} activeId={activeId} mobileOnly />
      </div>

      <div className="case-study-inner" style={{ display: 'flex', gap: 60, paddingLeft: 100, paddingRight: 80, maxWidth: 1300 }}>

        {/* Sidebar nav — wrapper + inner both hidden on narrow screens */}
        <div className="section-nav-sidebar-wrap" style={{ width: 130, flexShrink: 0, alignSelf: 'flex-start', position: 'sticky', top: 80 }}>
          <SectionNav sections={project.sections} activeId={activeId} desktopOnly />
        </div>

        {/* Main card */}
        <div className="case-study-card" style={{
          flex: 1, minWidth: 0, maxWidth: 860,
          borderRadius: 20, border: `1px solid ${C.greenSubtle}`,
          background: C.white, padding: '40px 48px',
        }}>
          {/* Title block */}
          {/* Title block */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 24, marginBottom: 48 }}>
            {(project.cardImg || project.logo) && (
              <img src={project.cardImg || project.logo} alt={project.title}
                style={{ width: 100, height: 100, objectFit: 'contain', flexShrink: 0 }} />
            )}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div className="case-study-title" style={{ fontFamily: "'Poppins', sans-serif", fontWeight: 200, fontSize: 48, color: C.ink, lineHeight: 1 }}>
                {project.title}
              </div>
              <div style={{ fontFamily: "'Poppins', sans-serif", fontSize: 22, color: C.gray, lineHeight: 1 }}>
                {project.category}
              </div>
            </div>
          </div>

          {/* Sections */}
          {project.sections.map((sec) => {
            if (rendered.has(sec.id)) return null;

            if (sec.layout === 'full' || sec.layout === 'outcomes') {
              rendered.add(sec.id);
              return (
                <div key={sec.id} id={`section-${sec.id}`} className="section-anchor"
                  ref={el => anchorRefs.current[sec.id] = el} style={{ marginBottom: 48 }}>
                  <SectionHeader label={sec.label} />
                  <ContentRenderer content={sec.content} contentParts={sec.contentParts} isOutcomes={sec.id === 'outcomes'} />
                  {(sec.images || (sec.image ? [sec.image] : [])).map((img, idx) => (
                    <figure key={idx} style={{ marginTop: 24 }}>
                      <div style={{
                        borderRadius: 10,
                        background: img.bg || 'rgb(247,249,246)',
                        border: '1px solid rgb(233,237,234)',
                        overflow: 'hidden',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        minHeight: img.src ? 'auto' : 200,
                      }}>
                        {img.src ? (
                          <img src={img.src} alt={img.caption}
                            style={{ display: 'block', width: img.maxWidth || '100%', height: 'auto' }} />
                        ) : (
                          <span style={{ fontFamily: "'Poppins',sans-serif", fontSize: 13, color: 'rgb(158,158,158)', fontStyle: 'italic', padding: 24 }}>
                            {img.caption}
                          </span>
                        )}
                      </div>
                      {img.src && (
                        <figcaption style={{
                          fontFamily: "'Open Sans',sans-serif", fontSize: 13,
                          color: 'rgb(122,122,122)', fontStyle: 'italic',
                          marginTop: 10, lineHeight: 1.55,
                        }}>{img.caption}</figcaption>
                      )}
                    </figure>
                  ))}
                </div>
              );
            }

            if (sec.layout === 'highlight') {
              rendered.add(sec.id);
              return (
                <div key={sec.id} id={`section-${sec.id}`} className="section-anchor"
                  ref={el => anchorRefs.current[sec.id] = el}
                  style={{ borderRadius: 10, background: C.warmWhite, padding: '24px 28px', marginBottom: 48 }}>
                  <SectionHeader label={sec.label} />
                  <BodyText>{sec.content}</BodyText>
                </div>
              );
            }

            if (sec.layout === 'half-left') {
              const pair = project.sections.find(s => s.id === sec.pairId);
              rendered.add(sec.id);
              if (pair) rendered.add(pair.id);
              return (
                <div key={sec.id} style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 48 }}>
                  <div id={`section-${sec.id}`} className="section-anchor"
                    ref={el => anchorRefs.current[sec.id] = el}
                    style={{ borderRadius: 10, border: `1px solid ${C.greenLight}`, padding: '24px 26px' }}>
                    <SectionHeader label={sec.label} />
                    <BulletList content={sec.content} />
                  </div>
                  {pair && (
                    <div id={`section-${pair.id}`} className="section-anchor"
                      ref={el => anchorRefs.current[pair.id] = el}
                      style={{ borderRadius: 10, border: `1px solid ${C.greenLight}`, padding: '24px 26px' }}>
                      <SectionHeader label={pair.label} />
                      <BulletList content={pair.content} />
                    </div>
                  )}
                </div>
              );
            }

            if (sec.layout === 'details') {
              rendered.add(sec.id);
              return (
                <div key={sec.id} id={`section-${sec.id}`} className="section-anchor"
                  ref={el => anchorRefs.current[sec.id] = el} style={{ marginBottom: 0 }}>
                  {sec.subsections.map((sub, i) => (
                    <div key={i} style={{ marginBottom: i < sec.subsections.length - 1 ? 40 : 0 }}>
                      <SectionHeader label={sub.label} />
                      <BodyText>{sub.content}</BodyText>
                    </div>
                  ))}
                </div>
              );
            }

            return null;
          })}

          {/* Prev / Next case study */}
          <div style={{
            marginTop: 56, paddingTop: 32,
            borderTop: `1px solid ${C.greenSubtle}`,
            display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16,
          }}>
            <a className="prev-next-btn" onClick={() => { window.scrollTo({ top: 0 }); onProject(prevProj.id); }}
              style={{
                cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 14,
                padding: '16px 20px',
                borderRadius: 10, border: `1px solid ${C.greenLight}`,
                textDecoration: 'none',
              }}>
              <span style={{ fontFamily: "'Poppins',sans-serif", fontSize: 18, color: C.green, lineHeight: 1 }}>←</span>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 0 }}>
                <span style={{ fontFamily: "'Poppins',sans-serif", fontWeight: 500, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: C.gray }}>Previous</span>
                <span style={{ fontFamily: "'Poppins',sans-serif", fontWeight: 400, fontSize: 16, color: C.ink, lineHeight: 1.2 }}>{prevProj.title}</span>
              </div>
            </a>
            <a className="prev-next-btn" onClick={() => { window.scrollTo({ top: 0 }); onProject(nextProj.id); }}
              style={{
                cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 14, justifyContent: 'flex-end',
                padding: '16px 20px',
                borderRadius: 10, border: `1px solid ${C.greenLight}`,
                textDecoration: 'none', textAlign: 'right',
              }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 0, alignItems: 'flex-end' }}>
                <span style={{ fontFamily: "'Poppins',sans-serif", fontWeight: 500, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: C.gray }}>Next</span>
                <span style={{ fontFamily: "'Poppins',sans-serif", fontWeight: 400, fontSize: 16, color: C.ink, lineHeight: 1.2 }}>{nextProj.title}</span>
              </div>
              <span style={{ fontFamily: "'Poppins',sans-serif", fontSize: 18, color: C.green, lineHeight: 1 }}>→</span>
            </a>
          </div>
        </div>
      </div>
      {/* bottom spacer so last section can scroll to top */}
      <div style={{ height: '50vh' }} />
    </main>
  );
}

  "gridColumns": 3,
  "cardRadius": 16,
  "heroSize": 56

function App() {
  const [screen, setScreen]     = useState(() => _screenParam || localStorage.getItem('je-v2-screen') || 'home');
  const [tweaks, setTweaks]     = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    localStorage.setItem('je-v2-screen', screen);
    if (!screen.startsWith('project-')) window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [screen]);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  function setTweak(k, v) {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  }

  return (
    <div style={{ background: C.warmWhite, minHeight: '100vh' }}>
      <Header screen={screen} onNav={dest => setScreen(dest)} />

      {screen === 'home'    && <HomePage onProject={id => setScreen('project-' + id)} />}
      {screen === 'about'   && <AboutPage />}
      {screen === 'resume'  && <ResumePage />}
      {screen.startsWith('project-') && (
        <CaseStudyPage projectId={screen.replace('project-', '')} onBack={() => setScreen('home')} onProject={id => setScreen('project-' + id)} />
      )}

      <Footer onNav={dest => setScreen(dest)} />

      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 999,
          background: C.white, border: `1px solid ${C.greenSubtle}`,
          borderRadius: 12, padding: '20px 24px', minWidth: 240,
          boxShadow: '0 8px 32px rgba(0,0,0,0.10)',
          fontFamily: "'Poppins', sans-serif",
        }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: C.ink, marginBottom: 18, borderBottom: `1px solid ${C.greenSubtle}`, paddingBottom: 10 }}>Tweaks</div>
          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.gray, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Grid columns — {tweaks.gridColumns}</div>
            <input type="range" min={1} max={4} step={1} value={tweaks.gridColumns}
              onChange={e => setTweak('gridColumns', Number(e.target.value))}
              style={{ width: '100%', accentColor: C.green }} />
          </label>
          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.gray, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Card radius — {tweaks.cardRadius}px</div>
            <input type="range" min={0} max={32} step={2} value={tweaks.cardRadius}
              onChange={e => setTweak('cardRadius', Number(e.target.value))}
              style={{ width: '100%', accentColor: C.green }} />
          </label>
          <label style={{ display: 'block' }}>
            <div style={{ fontSize: 11, color: C.gray, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Hero size — {tweaks.heroSize}px</div>
            <input type="range" min={36} max={80} step={2} value={tweaks.heroSize}
              onChange={e => setTweak('heroSize', Number(e.target.value))}
              style={{ width: '100%', accentColor: C.green }} />
          </label>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
